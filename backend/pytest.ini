[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (requires running services)
    slow: Tests that take more than 2 seconds
env =
    POSTGRES_HOST=localhost
    POSTGRES_PORT=5432
    POSTGRES_USER=postgres
    POSTGRES_PASSWORD=postgres
    POSTGRES_DB=research_test
    REDIS_HOST=localhost
    REDIS_PORT=6379
    QDRANT_HOST=localhost
    QDRANT_PORT=6333
    OPENAI_API_KEY=test-key
    SECRET_KEY=test-secret-key-for-testing-only-256bits
    DEBUG=true
